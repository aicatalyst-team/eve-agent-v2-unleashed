version: '3.8'

# Eve V2U Unleashed — standalone agent container
# Joins the existing eve-network to reach the ollama container.
#
# Usage:
#   docker compose -f docker-compose.v2u.yml up -d
#
# Then open http://localhost:7778 — or use the panel in eve_pro_theme_interface.html.
# To set workspace: POST http://localhost:7778/workspace  {"path":"/workspace/myproject"}

services:
  eve-v2u-unleashed:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eve-v2u-unleashed
    ports:
      - "7778:7777"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=jeffgreen311/Eve-V2-Unleashed-Qwen3.5-8B-Liberated-4K-4B-Merged:latest
      - EVE_DEFAULT_MODEL=jeffgreen311/Eve-V2-Unleashed-Qwen3.5-8B-Liberated-4K-4B-Merged:latest
      - EVE_WORKSPACE=/workspace
      - EVE_IN_DOCKER=1
      # Optional: set workspace to a specific host path by overriding EVE_WORKSPACE
      # e.g.  EVE_WORKSPACE=/workspace/myapp
    volumes:
      # Persist quests and RPG stats across restarts
      - eve_v2u_data:/app/quests
    networks:
      - eve-network
    restart: unless-stopped

networks:
  eve-network:
    external: true

volumes:
  eve_v2u_data:
    driver: local
